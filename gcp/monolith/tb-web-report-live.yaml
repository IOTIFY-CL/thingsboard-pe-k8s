apiVersion: apps/v1
kind: Deployment
metadata:
  name: tb-web-report
  namespace: thingsboard
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: tb-web-report
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: tb-web-report
    spec:
      containers:
      - env:
        - name: HTTP_BIND_ADDRESS
          value: 0.0.0.0
        - name: HTTP_BIND_PORT
          value: "8383"
        - name: LOGGER_LEVEL
          value: info
        - name: LOG_FOLDER
          value: logs
        - name: LOGGER_FILENAME
          value: tb-web-report-%DATE%.log
        - name: NODE_OPTIONS
          value: --max-old-space-size=400
        - name: DOCKER_MODE
          value: "true"
        - name: DEFAULT_PAGE_NAVIGATION_TIMEOUT
          value: "120000"
        - name: DASHBOARD_LOAD_WAIT_TIME
          value: "3000"
        - name: USE_NEW_PAGE_FOR_REPORT
          value: "true"
        image: thingsboard/tb-pe-web-report:4.0.1PE
        imagePullPolicy: Always
        livenessProbe:
          failureThreshold: 3
          periodSeconds: 20
          successThreshold: 1
          tcpSocket:
            port: 8383
          timeoutSeconds: 1
        name: server
        ports:
        - containerPort: 8383
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          periodSeconds: 20
          successThreshold: 1
          tcpSocket:
            port: 8383
          timeoutSeconds: 1
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      nodeSelector:
        role: main
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
